# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: "Run Automated Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-style-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Use Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"
      - name: "Install dependencies"
        # Linters need only the npm packages, not the Electron binary or the
        # Playwright Chromium download (those big CDN fetches are slow/flaky and
        # previously timed out this job). The test job below still installs them.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          npm install --no-audit --no-fund --no-update-notifier
      - name: "Run linter tests"
        run: |
          node --run test:prettier
          node --run test:js
          node --run test:css
          node --run test:markdown
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: [22.21.1, 22.x, 24.x]
    steps:
      - name: Install electron dependencies and labwc
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libasound2t64 labwc
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Use Node.js ${{ matrix.node-version }}"
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
          cache: "npm"
      - name: "Install MagicMirror²"
        run: |
          node --run install-mm:dev
      - name: "Install Playwright browsers"
        run: |
          npx playwright install --with-deps chromium
      - name: "Prepare environment for tests"
        run: |
          # Fix chrome-sandbox permissions:
          sudo chown root:root ./node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 ./node_modules/electron/dist/chrome-sandbox
          # Start labwc
          WLR_BACKENDS=headless WLR_LIBINPUT_NO_DEVICES=1 WLR_RENDERER=pixman labwc &
          touch css/custom.css
      - name: "Run tests"
        run: |
          export WAYLAND_DISPLAY=wayland-0
          node --run test
